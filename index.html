<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ahmed FM | راديو أحمد</title>
    
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --scale: 0.75;
            --caster-red: #e81e4d;
        }
        
        * { -webkit-tap-highlight-color: transparent; user-select: none; }

        body { 
            background: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            padding: 0; 
            margin: 0; 
            direction: rtl; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            padding-top: env(safe-area-inset-top);
        }
        
        .player-container { 
            background: #1c1c1c; 
            padding: calc(30px * var(--scale)) calc(18px * var(--scale)); 
            border-radius: 25px; 
            width: 95%; 
            max-width: 900px; 
            margin: 15px auto; 
            box-shadow: 0 0 60px rgba(0,0,0,0.8); 
            border: 1px solid #333; 
            box-sizing: border-box; 
            position: relative; 
        }

        h1 { font-size: clamp(28px, 8vw, 50px); margin-bottom: 8px; color: #fff; }
        p { font-size: clamp(14px, 3vw, 18px); opacity: 0.7; margin-bottom: 25px; direction: ltr; }
        
        .live-status { font-size: 22px; font-weight: bold; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color: var(--caster-red); animation: blink 1s infinite; font-size: 26px; }

        .cstrEmbed { margin-top: 10px; border-radius: 15px; overflow: hidden; width: 100%; background: #fff; }

        .time-box { margin-top: 25px; font-size: clamp(16px, 4vw, 22px); font-weight: bold; color: #fff; background: #000; display: inline-block; padding: 10px 25px; border-radius: 12px; direction: ltr; }
        
        .call-live-wrapper { margin-top: 30px; display: flex; justify-content: center; }
        .call-live {
            background: var(--caster-red);
            text-decoration: none;
            color: white;
            padding: 12px 30px;
            border-radius: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(232, 30, 77, 0.3);
        }
        .call-live:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .social { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social a { 
            text-decoration: none; 
            color: white; 
            background: #282828; 
            padding: 12px 20px; 
            border-radius: 12px; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 14px; 
            min-width: 110px; 
            justify-content: center;
            border: 1px solid #333;
        }
        .social a:hover { background: #333; transform: translateY(-2px); }

        .fa-facebook { color: #1877F2; }
        .fa-whatsapp { color: #25D366; }

        .live-dot { height: 10px; width: 10px; background-color: #fff; border-radius: 50%; display: inline-block; animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        
        #disqus_thread { margin: 25px auto; width: 95%; max-width: 900px; background: #1c1c1c; padding: 20px; border-radius: 25px; border: 1px solid #333; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        <div class="live-status"><span class="live-on">●</span> LIVE</div>
        
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false">
            <a href="https://www.caster.fm">Shoutcast Hosting</a>
            <a href="https://www.caster.fm">Stream Hosting</a>
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>

        <div class="time-box" id="time">🕒 --:--:--</div>
        
        <div class="call-live-wrapper">
            <a href="tel:01027415909" class="call-live">
                <i class="fas fa-phone-alt"></i> 
                <span>Live Call</span>
                <span class="live-dot"></span>
            </a>
        </div>

        <div style="margin-top:30px; color:#bbb; font-size: 14px;">Contact The Host</div>
        <div class="social">
            <a href="https://www.facebook.com/ana09090" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://wa.me/201027415909" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </div>
    </div>

    <div id="disqus_thread"></div>

    <script src="https://cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        // سكريبت الوقت
        function updateTime() {
            const now = new Date();
            document.getElementById("time").innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // إعدادات Disqus المحدثة
        var disqus_config = function () {
            this.page.url = "https://ahmed-fm.vercel.app"; // الرابط الرسمي لضمان استقرار التعليقات
            this.page.identifier = 'ahmedfm_main'; 
        };
        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://ahmedfm.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date()); // لضمان تحديث الإعدادات فوراً
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
