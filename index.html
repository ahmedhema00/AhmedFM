<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed FM | راديو أحمد</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px 10px; margin: 0; direction: rtl; }

        #installBanner {
            display: none;
            background: rgba(28, 28, 28, 0.95);
            color: white;
            padding: 12px 15px;
            position: fixed;
            top: 20px;
            left: 5%;
            width: 90%;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #ff3b3b;
            border-radius: 20px;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        #installBanner .banner-text { font-size: 13px; font-weight: 500; text-align: right; }
        #installBanner .banner-actions { display: flex; align-items: center; gap: 12px; }
        #installBtn { background: #ff3b3b; color: white; border: none; padding: 8px 14px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; }
        #closeBanner { cursor: pointer; font-size: 22px; line-height: 1; color: #888; }

        .player-container { background: #1c1c1c; padding: 50px 25px; border-radius: 40px; width: 95%; max-width: 900px; margin: 20px auto; box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 1px solid #333; }

        h1 { font-size: clamp(40px, 10vw, 65px); margin-bottom: 10px; }
        p { font-size: clamp(18px, 4vw, 24px); opacity: 0.7; margin-bottom: 40px; direction: ltr; }

        .live-status { font-size: 28px; font-weight: bold; margin-bottom: 35px; display: flex; justify-content: center; gap: 15px; }

        @keyframes blink { 50% {opacity:0.3;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; }

        /* ✅ تثبيت الحجم + قص النص */
        .cstrEmbed {
            margin-top: 15px;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            height: 120px;
            background: #fff;
            display: flex;
            align-items: center;
        }

        .cstrEmbed * {
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }

        .cstrEmbed a { font-size: 13px !important; color: #888 !important; text-decoration: none !important; margin: 12px 8px; }

        .time-box { margin-top: 40px; font-size: 24px; background: #000; padding: 15px 35px; border-radius: 15px; direction: ltr; }

        .social { margin-top: 25px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }

        .social a { color: white; background: #282828; padding: 15px 30px; border-radius: 15px; text-decoration: none; display: flex; gap: 10px; }

        .social a:hover { background: #ff3b3b; }

        #disqus_thread {
            margin: 40px auto;
            width: 95%;
            max-width: 900px;
            background: #1c1c1c;
            padding: 30px;
            border-radius: 35px;
            border: 1px solid #333;
        }
    </style>
</head>

<body>

<div id="installBanner">
    <span class="banner-text">📻 استمع بجودة أفضل.. ثبّت التطبيق</span>
    <div class="banner-actions">
        <button id="installBtn">تثبيت</button>
        <span id="closeBanner">&times;</span>
    </div>
</div>

<div class="player-container">
    <h1>🎙️ Ahmed FM</h1>
    <p>Live Radio Station</p>

    <div class="live-status"><span class="live-on">●</span> LIVE</div>

    <div class="cstrEmbed"
        data-type="newStreamPlayer"
        data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c"
        data-theme="light"
        data-color="e81e4d">
    </div>

    <div class="time-box" id="time"></div>

    <div style="margin-top:50px;">Contact The Host</div>

    <div class="social">
        <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
        <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    </div>
</div>

<div id="disqus_thread"></div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

<script>
/* الوقت */
function updateTime() {
    document.getElementById("time").innerText =
        "🕒 " + new Date().toLocaleTimeString('en-GB');
}
setInterval(updateTime, 1000);
updateTime();

/* Disqus */
var disqus_config = function () {
    this.page.url = window.location.href;
    this.page.identifier = "ahmedfm_main";
};

(function() {
    var d = document, s = d.createElement('script');
    s.src = 'https://ahmedfm.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.body || d.head).appendChild(s);
})();
</script>

</body>
</html>
