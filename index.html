<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed FM | راديو أحمد</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px 10px; margin: 0; direction: rtl; }
        
        /* بانر التثبيت */
        #installBanner {
            display: none;
            background: rgba(28, 28, 28, 0.95);
            color: white;
            padding: 12px 15px;
            position: fixed;
            top: 20px;
            left: 5%;
            width: 90%;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #ff3b3b;
            border-radius: 20px;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .player-container { background: #1c1c1c; padding: 50px 25px; border-radius: 40px; width: 95%; max-width: 900px; margin: 20px auto; box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 1px solid #333; box-sizing: border-box; position: relative; }
        h1 { font-size: clamp(40px, 10vw, 65px); margin-bottom: 10px; color: #fff; }
        p { font-size: clamp(18px, 4vw, 24px); opacity: 0.7; margin-bottom: 40px; direction: ltr; }
        .live-status { font-size: 28px; font-weight: bold; margin-bottom: 35px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; font-size: 35px; }

        /* --- تطبيق فكرة الـ Scale الذكية --- */
        .cstrEmbed { 
            margin: 25px auto 15px auto; 
            border-radius: 20px; 
            overflow: hidden; 
            width: 100%; 
            background: #fff; 
            /* تثبيت الارتفاع لمنع التمدد */
            height: 220px !important; 
            max-height: 220px !important; 
            box-sizing: border-box;
            position: relative;
        }

        .cstrEmbed iframe {
            width: 112% !important; /* تكبير العرض الوهمي لتعويض الـ Scale */
            height: 112% !important;
            border: none;
            /* تصغير المحتوى بنسبة بسيطة عشان اسم الأغنية ياخد راحته */
            transform: scale(0.9); 
            transform-origin: top center;
            position: absolute;
            left: -6%; /* توسيط المحتوى بعد التصغير */
            top: 0;
        }
        /* ---------------------------------- */

        .time-box { margin-top: 40px; font-size: clamp(22px, 5vw, 28px); font-weight: bold; color: #fff; background: #000; display: inline-block; padding: 15px 35px; border-radius: 15px; direction: ltr; }
        .social { margin-top: 25px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .social a { text-decoration: none; color: white; background: #282828; padding: 15px 30px; border-radius: 15px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 18px; min-width: 150px; justify-content: center; }
        .social a:hover { background: #ff3b3b; }
        #disqus_thread { margin: 40px auto; width: 95%; max-width: 900px; background: #1c1c1c; padding: 30px; border-radius: 35px; border: 1px solid #333; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="installBanner">
        <span class="banner-text">📻 استمع بجودة أفضل.. ثبّت تطبيق أحمد FM</span>
        <div class="banner-actions">
            <button id="installBtn">تثبيت</button>
            <span id="closeBanner">&times;</span>
        </div>
    </div>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        <div class="live-status"><span id="liveLight" class="live-on">●</span> LIVE</div>
        
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false">
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>

        <div class="time-box" id="time">🕒 --:--:--</div>
        <div style="margin-top:50px; color:#bbb; font-size: 18px;">Contact The Host</div>
        <div class="social">
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>

    <div id="disqus_thread"></div>

    <script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        // سكربت الوقت والبانر
        function updateTime() {
            const now = new Date();
            document.getElementById("time").innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Install Banner Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'flex';
        });

        document.getElementById('installBtn').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                document.getElementById('installBanner').style.display = 'none';
            }
        });

        document.getElementById('closeBanner').addEventListener('click', () => {
            document.getElementById('installBanner').style.display = 'none';
        });

        // Disqus
        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://ahmedfm.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
