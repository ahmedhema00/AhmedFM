<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ahmed FM | راديو أحمد</title>
    
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --scale: 0.75;
            --caster-red: #e81e4d;
            --neon-glow: 0 0 12px rgba(232, 30, 77, 0.7);
        }
        
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body { 
            background: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            padding: 0; 
            margin: 0; 
            direction: rtl; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            padding-top: env(safe-area-inset-top);
        }

        /* إصلاح المشغل - إجباري الظهور */
        .cstrEmbed { 
            margin-top: 15px; 
            border-radius: 15px; 
            overflow: hidden; 
            width: 100% !important; 
            min-height: 120px !important; /* ضمان وجود مساحة للمشغل */
            background: #fff; 
            display: block !important;
        }

        /* بانر عائم Overlay احترافي وشفاف */
        #pwa-install-banner {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 350px;
            background: rgba(28, 28, 28, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            border-radius: 20px;
            padding: 12px 15px;
            display: none; 
            align-items: center;
            justify-content: space-between;
            z-index: 99999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .pwa-text { font-size: 13px; color: #eee; }
        .pwa-actions { display: flex; align-items: center; gap: 10px; }
        .btn-install { background: #444; color: #fff; border: 1px solid #666; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .btn-close { background: transparent; color: #999; border: none; font-size: 22px; cursor: pointer; }

        /* باقي التصميم */
        .player-container { 
            background: #1c1c1c; 
            padding: 25px 15px; 
            border-radius: 25px; 
            width: 95%; 
            max-width: 600px; 
            margin: 30px auto; 
            box-shadow: 0 0 60px rgba(0,0,0,0.8); 
            border: 1px solid #333; 
        }

        h1 { font-size: 32px; margin-bottom: 5px; color: #fff; }
        p { font-size: 14px; opacity: 0.6; margin-bottom: 20px; }
        
        .live-status { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: var(--caster-red); }
        
        .time-box { 
            margin-top: 20px; font-size: 20px; font-weight: bold; color: #fff; background: #000; 
            padding: 10px 20px; border-radius: 12px; border: 1.5px solid var(--caster-red); box-shadow: var(--neon-glow);
            display: inline-flex; direction: ltr;
        }
        
        .call-live {
            background: var(--caster-red); text-decoration: none; color: white; padding: 12px 25px;
            border-radius: 15px; font-weight: bold; display: flex; align-items: center; gap: 10px;
            margin-top: 25px; justify-content: center; width: fit-content; margin-left: auto; margin-right: auto;
        }

        .request-btn {
            text-decoration: none; color: white; background: #1c1c1c; padding: 10px 20px;
            border-radius: 12px; display: inline-flex; align-items: center; gap: 10px;
            margin-top: 25px; border: 1.5px solid var(--caster-red);
        }
    </style>
</head>
<body>

    <div id="pwa-install-banner">
        <div class="pwa-text">📻 تثبيت تطبيق راديو أحمد</div>
        <div class="pwa-actions">
            <button class="btn-install" id="installBtn">تثبيت</button>
            <button class="btn-close" onclick="hideBanner()">×</button>
        </div>
    </div>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        <div class="live-status">● LIVE</div>
        
        <!-- المشغل الأصلي غصب عن المتصفح -->
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d" data-rendered="false">
            <a href="https://www.caster.fm">Shoutcast Hosting</a>
        </div>

        <div class="time-box">🕒 <span id="time-digits">--:--:--</span> <span id="time-ampm">--</span></div>
        
        <a href="tel:01027415909" class="call-live"><i class="fas fa-phone-alt"></i> Live Call</a>

        <div style="margin-top: 20px;">
            <a href="https://t.me/ahmedib9090" target="_blank" class="request-btn">
                <i class="fab fa-telegram"></i> طلب أغنية 🎵
            </a>
        </div>
    </div>

    <div id="disqus_thread" style="width: 95%; max-width: 600px; margin-top: 20px;"></div>

    <script src="https://cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        // ضبط البانر
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const lastHidden = localStorage.getItem('pwa_hidden');
            const threeDays = 3 * 24 * 60 * 60 * 1000;
            if (!lastHidden || (Date.now() - lastHidden) > threeDays) {
                document.getElementById('pwa-install-banner').style.display = 'flex';
            }
        });

        document.getElementById('installBtn').onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('pwa-install-banner').style.display = 'none';
                deferredPrompt = null;
            }
        };

        function hideBanner() {
            document.getElementById('pwa-install-banner').style.display = 'none';
            localStorage.setItem('pwa_hidden', Date.now());
        }

        // تسجيل SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        // الوقت
        function updateTime() {
            const now = new Date();
            document.getElementById("time-digits").innerText = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById("time-ampm").innerText = now.getHours() >= 12 ? 'PM' : 'AM';
        }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
