<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ahmed FM | راديو أحمد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --scale: 0.75; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; direction: rtl; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: env(safe-area-inset-top); }
        .player-container { background: #1c1c1c; padding: 25px; border-radius: 25px; width: 95%; max-width: 900px; margin: 15px auto; box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 1px solid #333; box-sizing: border-box; }
        h1 { font-size: 40px; margin-bottom: 8px; color: #fff; }
        .live-status { font-size: 22px; font-weight: bold; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; font-size: 26px; }
        .social { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social a { text-decoration: none; color: white; background: #282828; padding: 12px 20px; border-radius: 12px; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; min-width: 110px; justify-content: center; }
        
        /* زر تليجرام المؤكد */
        .social a.telegram-live { background: #26A5E4; font-weight: bold; min-width: 170px; }
        .live-dot { height: 8px; width: 8px; background-color: #fff; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }
        
        .time-box { margin-top: 25px; font-size: 20px; font-weight: bold; background: #000; padding: 10px 25px; border-radius: 12px; direction: ltr; }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        <div class="live-status"><span class="live-on">●</span> LIVE CONNECTED</div>

        <div class="social">
            <a href="https://t.me/ahmedib9090" target="_blank" class="telegram-live">
                <i class="fab fa-telegram"></i> 
                <span>Live Call on Telegram</span>
                <span class="live-dot"></span>
            </a>
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>

        <div class="time-box" id="time">🕒 --:--:--</div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById("time").innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
