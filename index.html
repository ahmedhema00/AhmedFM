<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed FM | راديو أحمد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* رجعنا للأصول: ممنوع Zoom أو Scale على مستوى الصفحة */
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 10px; direction: rtl; overflow-x: hidden; }
        
        .player-container { 
            background: #1c1c1c; 
            padding: 30px 15px; 
            border-radius: 35px; 
            width: 95%; 
            max-width: 800px; 
            margin: 20px auto; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            border: 1px solid #333; 
            box-sizing: border-box; 
        }

        h1 { font-size: clamp(35px, 8vw, 55px); margin-bottom: 5px; }
        p { font-size: 18px; opacity: 0.7; margin-bottom: 25px; direction: ltr; }
        
        /* أهم جزء: الـ Widget لازم تكون براحتها تماماً */
        .cstrEmbed { 
            margin: 15px 0; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #fff; 
            min-height: 140px; /* الارتفاع المثالي لظهور المشغل */
            width: 100% !important;
        }

        .time-box { margin-top: 25px; font-size: 24px; font-weight: bold; background: #000; display: inline-block; padding: 10px 25px; border-radius: 12px; direction: ltr; }
        .social { margin-top: 25px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social a { text-decoration: none; color: white; background: #282828; padding: 12px 25px; border-radius: 12px; font-size: 16px; min-width: 130px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #disqus_thread { margin: 30px auto; width: 95%; max-width: 800px; background: #1c1c1c; padding: 20px; border-radius: 30px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false">
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>

        <div class="time-box" id="time">🕒 --:--:--</div>
        <div style="margin-top:40px; color:#bbb;">Contact The Host</div>
        <div class="social">
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
        </div>
    </div>

    <div id="disqus_thread"></div>

    <script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById("time").innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();

        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://ahmedfm.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
