<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ahmed FM</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<!-- أيقونات -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    background: #0f0f0f;
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding-top: 60px;
    margin: 0;
}

h1 {
    font-size: 60px;
    letter-spacing: 3px;
    margin-bottom: 10px;
    color: #fff;
}

p {
    font-size: 20px;
    opacity: 0.7;
    margin-bottom: 40px;
}

/* الحاوية الرئيسية */
.player-container {
    background: #1c1c1c;
    padding: 60px;
    border-radius: 30px;
    width: 720px;
    margin: auto;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    border: 1px solid #333;
}

/* حالة البث */
.live-status {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

@keyframes blink {
0% {opacity:1;}
50% {opacity:0.3;}
100% {opacity:1;}
}

.live-on {
color:#ff3b3b;
animation: blink 1s infinite;
}

/* widget */
.cstrEmbed {
    margin-top: 25px;
    border-radius: 15px;
    overflow: hidden;
    width: 100%;
    transform: scale(1.2);
    transform-origin: center;
}

.cstrEmbed a {
    font-size: 12px !important;
    color: #777 !important;
    text-decoration: none !important;
    display: inline-block !important;
    margin: 10px 5px;
}

/* ===== الوقت (تكبير) ===== */
.time-box {
    margin-top: 25px;
    font-size: 20px;
    font-weight: bold;
    color: #ddd;
    background: #111;
    display: inline-block;
    padding: 10px 18px;
    border-radius: 10px;
}

/* ===== عنوان السوشيال ===== */
.social-title {
    margin-top: 35px;
    font-size: 18px;
    color: #bbb;
    letter-spacing: 1px;
}

/* ===== السوشيال ===== */
.social {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.social a {
    text-decoration: none;
    color: white;
    background: #222;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
}

.social a:hover {
    background: #ff3b3b;
}

.social a i {
    font-size: 18px;
}

</style>
</head>

<body>

<div class="player-container">

<h1>Ahmed FM 🎙️</h1>
<p>Live Radio Station</p>

<div class="live-status">
<span id="liveLight" class="live-on" style="font-size:32px;">●</span> LIVE
</div>

<!-- WIDGET -->
<div data-type="newStreamPlayer"
data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c"
data-theme="light"
data-color="e81e4d"
data-channelId=""
data-rendered="false"
class="cstrEmbed">

<a href="https://www.caster.fm">Shoutcast Hosting</a>
<a href="https://www.caster.fm">Stream Hosting</a>
<a href="https://www.caster.fm">Radio Server Hosting</a>

</div>

<!-- الوقت -->
<div class="time-box" id="time">🕒 --:--:--</div>

<!-- عنوان السوشيال -->
<div class="social-title">تابعنا للتواصل</div>

</div>

<!-- السوشيال -->
<div class="social">

<a href="https://www.facebook.com/ana09090" target="_blank">
<i class="fab fa-facebook"></i> Facebook
</a>

<a href="https://wa.me/201027415909" target="_blank">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

</div>

<script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

<!-- LIVE blink -->
<script>
const live = document.getElementById("liveLight");

setInterval(() => {
    live.style.opacity = (live.style.opacity == "0.3") ? "1" : "0.3";
}, 600);
</script>

<!-- CLOCK -->
<script>
function updateTime() {
    const now = new Date();
    document.getElementById("time").innerText =
        "🕒 " + now.toLocaleTimeString('en-GB');
}
setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
