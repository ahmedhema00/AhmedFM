<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed FM | راديو أحمد</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 40px 10px; margin: 0; direction: rtl; }
        
        /* استايل بانر التثبيت الذكي */
        #installBanner {
            display: none;
            background: #1c1c1c;
            color: white;
            padding: 12px 15px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
            border-bottom: 2px solid #ff3b3b;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }
        #installBanner .banner-text { font-size: 14px; font-weight: 500; }
        #installBanner .banner-actions { display: flex; align-items: center; gap: 15px; }
        #installBtn { background: #ff3b3b; color: white; border: none; padding: 7px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 13px; }
        #closeBanner { cursor: pointer; font-size: 24px; line-height: 1; color: #888; transition: 0.3s; }
        #closeBanner:hover { color: white; }

        .player-container { background: #1c1c1c; padding: 50px 25px; border-radius: 40px; width: 95%; max-width: 900px; margin: 30px auto 0; box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 1px solid #333; box-sizing: border-box; }
        h1 { font-size: clamp(40px, 10vw, 65px); margin-bottom: 10px; color: #fff; }
        p { font-size: clamp(18px, 4vw, 24px); opacity: 0.7; margin-bottom: 40px; direction: ltr; }
        .live-status { font-size: 28px; font-weight: bold; margin-bottom: 35px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; font-size: 35px; }
        .cstrEmbed { margin-top: 15px; border-radius: 20px; overflow: hidden; width: 100%; box-sizing: border-box; background: #fff; }
        .cstrEmbed a { font-size: 13px !important; color: #888 !important; text-decoration: none !important; display: inline-block !important; margin: 12px 8px; }
        .time-box { margin-top: 40px; font-size: clamp(22px, 5vw, 28px); font-weight: bold; color: #fff; background: #000; display: inline-block; padding: 15px 35px; border-radius: 15px; direction: ltr; }
        .social { margin-top: 25px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .social a { text-decoration: none; color: white; background: #282828; padding: 15px 30px; border-radius: 15px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 18px; min-width: 150px; justify-content: center; }
        .social a:hover { background: #ff3b3b; }
        #disqus_thread { margin: 40px auto; width: 95%; max-width: 900px; background: #1c1c1c; padding: 30px; border-radius: 35px; border: 1px solid #333; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="installBanner">
        <span class="banner-text">📻 استمع بجودة أفضل.. ثبّت تطبيق أحمد FM</span>
        <div class="banner-actions">
            <button id="installBtn">تثبيت الآن</button>
            <span id="closeBanner" title="إغلاق">&times;</span>
        </div>
    </div>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        <div class="live-status"><span id="liveLight" class="live-on">●</span> LIVE</div>
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false">
            <a href="https://www.caster.fm">Shoutcast Hosting</a>
            <a href="https://www.caster.fm">Stream Hosting</a>
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>
        <div class="time-box" id="time">🕒 --:--:--</div>
        <div style="margin-top:50px; color:#bbb; font-size: 18px;">Contact The Host</div>
        <div class="social">
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>
    <div id="disqus_thread"></div>

    <script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');
        const closeBanner = document.getElementById('closeBanner');

        // دالة للتحقق من مرور 3 أيام
        function shouldShowBanner() {
            const lastClose = localStorage.getItem('bannerClosedDate');
            if (!lastClose) return true;

            const threeDaysInMs = 3 * 24 * 60 * 60 * 1000;
            const now = new Date().getTime();
            return (now - lastClose) > threeDaysInMs;
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // إظهار البانر فقط لو مر 3 أيام على آخر إغلاق
            if (shouldShowBanner()) {
                installBanner.style.display = 'flex';
            }
        });

        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install');
                    }
                    installBanner.style.display = 'none';
                    deferredPrompt = null;
                });
            }
        });

        closeBanner.addEventListener('click', () => {
            installBanner.style.display = 'none';
            // حفظ وقت الإغلاق في ذاكرة المتصفح
            localStorage.setItem('bannerClosedDate', new Date().getTime());
        });

        // Media Session Metadata
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: 'Ahmed FM | Live',
                artist: 'Live As You Love',
                album: 'Radio Ahmed FM',
                artwork: [
                    { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
                    { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
                ]
            });
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.error('Service Worker Error', err));
            });
        }

        function updateTime() {
            const now = new Date();
            document.getElementById("time").innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();

        var disqus_config = function () {
            this.page.url = window.location.href;  
            this.page.identifier = 'ahmedfm_main'; 
        };
        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://ahmedfm.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
