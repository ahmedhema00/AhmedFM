<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed FM | راديو أحمد</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 20px 10px; margin: 0; direction: rtl; }
        
        .player-container { background: #1c1c1c; padding: 50px 25px; border-radius: 40px; width: 95%; max-width: 900px; margin: 20px auto; box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 1px solid #333; box-sizing: border-box; position: relative; }
        h1 { font-size: clamp(40px, 10vw, 65px); margin-bottom: 10px; color: #fff; }
        p { font-size: clamp(18px, 4vw, 24px); opacity: 0.7; margin-bottom: 40px; direction: ltr; }
        .live-status { font-size: 28px; font-weight: bold; margin-bottom: 35px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; font-size: 35px; }

        /* --- الحل الجذري لتثبيت الحجم ومنع التمدد --- */
        .cstrEmbed { 
            margin-top: 15px; 
            border-radius: 20px; 
            background: #fff; 
            width: 100%;
            /* تثبيت الارتفاع على مقاس الأغنية القصيرة ومنع التمدد */
            height: 320px !important; 
            max-height: 320px !important;
            overflow: hidden !important; 
            position: relative;
            display: block;
        }

        /* محاولة إجبار النص الداخلي على التحرك يميناً ويساراً */
        .cstrEmbed iframe {
            height: 100% !important;
            width: 100% !important;
        }
        /* ------------------------------------------ */

        .time-box { margin-top: 40px; font-size: clamp(22px, 5vw, 28px); font-weight: bold; color: #fff; background: #000; display: inline-block; padding: 15px 35px; border-radius: 15px; direction: ltr; }
        .social { margin-top: 25px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .social a { text-decoration: none; color: white; background: #282828; padding: 15px 30px; border-radius: 15px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 18px; min-width: 150px; justify-content: center; }
        .social a:hover { background: #ff3b3b; }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        <div class="live-status"><span id="liveLight" class="live-on">●</span> LIVE</div>
        
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false">
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>

        <div class="time-box" id="time">🕒 --:--:--</div>
        <div class="social">
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>

    <script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        // سكربت إضافي لمحاولة الوصول للنص وتحويله لـ Marquee
        function applyMarqueeToInternalText() {
            try {
                const iframe = document.querySelector('.cstrEmbed iframe');
                if (iframe) {
                    const innerDoc = iframe.contentDocument || iframe.contentWindow.document;
                    // البحث عن مكان اسم الأغنية داخل كود كاستر
                    const songTitle = innerDoc.querySelector('div, b, span'); 
                    if (songTitle && songTitle.scrollWidth > songTitle.clientWidth) {
                        songTitle.style.whiteSpace = 'nowrap';
                        songTitle.style.display = 'inline-block';
                        songTitle.animate([
                            { transform: 'translateX(100%)' },
                            { transform: 'translateX(-100%)' }
                        ], {
                            duration: 10000,
                            iterations: Infinity
                        });
                    }
                }
            } catch (e) {
                // قد يمنع المتصفح الوصول لمحتوى iframe لو من دومين مختلف تماماً
                console.log("Marquee limited by security policy");
            }
        }
        setInterval(applyMarqueeToInternalText, 3000);

        function updateTime() {
            const now = new Date();
            document.getElementById("time").innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
