<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Ahmed FM | راديو أحمد</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body { 
            background: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            padding: 40px 20px; /* مسافة من فوق ومن الجوانب للحماية */
            margin: 0; 
            direction: rtl; 
        }

        /* الحاوية الرئيسية - زودنا العرض هنا عشان يكون فخم */
        .player-container { 
            background: #1c1c1c; 
            padding: 50px 40px; 
            border-radius: 35px; 
            max-width: 850px; /* عرض أكبر ومثالي للشاشات */
            margin: 0 auto; 
            box-shadow: 0 0 50px rgba(0,0,0,0.7); 
            border: 1px solid #333; 
            box-sizing: border-box; 
        }

        h1 { font-size: 55px; margin-bottom: 5px; color: #fff; }
        p { font-size: 20px; opacity: 0.7; margin-bottom: 35px; direction: ltr; }

        .live-status { 
            font-size: 26px; 
            font-weight: bold; 
            margin-bottom: 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
        }

        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; }
        
        /* تنسيق المشغل - مفرود مالي العرض */
        .cstrEmbed { 
            margin-top: 10px; 
            border-radius: 20px; 
            overflow: hidden; 
            width: 100%; 
            box-sizing: border-box;
            background: #fff; /* خلفية بيضاء عشان تليق مع المربع */
        }

        .cstrEmbed a { font-size: 12px !important; color: #777 !important; text-decoration: none !important; display: inline-block !important; margin: 10px 8px; }

        .time-box { 
            margin-top: 30px; 
            font-size: 22px; 
            font-weight: bold; 
            color: #eee; 
            background: #111; 
            display: inline-block; 
            padding: 12px 25px; 
            border-radius: 12px; 
            direction: ltr; 
        }

        .social { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social a { text-decoration: none; color: white; background: #222; padding: 12px 22px; border-radius: 12px; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 16px; }
        .social a:hover { background: #ff3b3b; }

        /* حاوية التعليقات - بنفس عرض المشغل */
        #disqus_thread { 
            margin: 40px auto; 
            max-width: 850px; 
            background: #1c1c1c; 
            padding: 30px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            box-sizing: border-box; 
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>Ahmed FM 🎙️</h1>
        <p>Live Radio Station</p>

        <div class="live-status">
            <span id="liveLight" class="live-on" style="font-size:32px;">●</span> LIVE
        </div>

        <div id="radio-wrapper" data-type="newStreamPlayer"
             data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c"
             data-theme="light"
             data-color="e81e4d"
             data-channelId=""
             data-rendered="false"
             class="cstrEmbed">
            <a href="https://www.caster.fm">Shoutcast Hosting</a>
            <a href="https://www.caster.fm">Stream Hosting</a>
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>

        <div class="time-box" id="time">🕒 --:--:--</div>

        <div style="margin-top:40px; color:#bbb; font-size: 16px; letter-spacing: 1px;">تواصل معنا</div>
        <div class="social">
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>

    <div id="disqus_thread"></div>

    <script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

    <script>
        // نظام الإنعاش التلقائي
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'visible') {
                const wrapper = document.getElementById('radio-wrapper');
                if(wrapper && window.CasterJS) {
                    window.CasterJS.loadWidgets();
                }
            }
        });

        function updateTime() {
            const now = new Date();
            document.getElementById("time").innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // إعدادات Disqus
        var disqus_config = function () {
            this.page.url = window.location.href;  
            this.page.identifier = 'ahmedfm_main'; 
        };
        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://ahmedfm.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
