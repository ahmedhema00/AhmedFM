<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ahmed FM | راديو أحمد</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --scale: 0.75; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        body { 
            background: #0f0f0f; color: white; font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; padding: 0; margin: 0; direction: rtl; 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start;
            padding-top: env(safe-area-inset-top);
        }
        .player-container { background: #1c1c1c; padding: calc(30px * var(--scale)) calc(18px * var(--scale)); border-radius: 25px; width: 95%; max-width: 900px; margin: 15px auto; box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 1px solid #333; box-sizing: border-box; position: relative; }
        h1 { font-size: clamp(28px, 8vw, 50px); margin-bottom: 8px; color: #fff; }
        p { font-size: clamp(14px, 3vw, 18px); opacity: 0.7; margin-bottom: 25px; direction: ltr; }
        .live-status { font-size: 22px; font-weight: bold; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; font-size: 26px; }
        .cstrEmbed { margin-top: 10px; border-radius: 15px; overflow: hidden; width: 100%; box-sizing: border-box; background: #fff; min-height: 120px; }
        .time-box { margin-top: 25px; font-size: clamp(16px, 4vw, 22px); font-weight: bold; color: #fff; background: #000; display: inline-block; padding: 10px 25px; border-radius: 12px; direction: ltr; }
        .social { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social a { text-decoration: none; color: white; background: #282828; padding: 12px 20px; border-radius: 12px; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; min-width: 110px; justify-content: center; }
        .social a:hover { background: #ff3b3b; }
        #disqus_thread { margin: 25px auto; width: 95%; max-width: 900px; background: #1c1c1c; padding: 20px; border-radius: 25px; border: 1px solid #333; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        <div class="live-status"><span id="liveLight" class="live-on">●</span> LIVE</div>
        
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d" data-rendered="false">
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>

        <div class="time-box" id="time">🕒 --:--:--</div>
        <div style="margin-top:30px; color:#bbb; font-size: 14px;">Contact The Host</div>
        <div class="social">
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>
    <div id="disqus_thread"></div>

    <script src="https://cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        // تحديث الوقت المباشر
        function updateTime() {
            const now = new Date();
            const timeEl = document.getElementById("time");
            if(timeEl) timeEl.innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // إعدادات التحكم في الميديا من خارج التطبيق (Native Controls)
        function initMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'Ahmed FM | راديو أحمد',
                    artist: 'بث مباشر الآن',
                    album: 'Live Stream',
                    artwork: [
                        { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
                        { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
                    ]
                });

                const actionHandlers = [
                    ['play', () => { document.querySelectorAll('audio, video').forEach(m => m.play()); }],
                    ['pause', () => { document.querySelectorAll('audio, video').forEach(m => m.pause()); }],
                    ['stop', () => { document.querySelectorAll('audio, video').forEach(m => m.pause()); }]
                ];

                for (const [action, handler] of actionHandlers) {
                    try { navigator.mediaSession.setActionHandler(action, handler); } catch (e) {}
                }
            }
        }

        // محاولة التشغيل الذكي عند فتح التطبيق
        window.addEventListener('load', () => {
            initMediaSession();
            // تأخير بسيط للتأكد من تحميل الويدجت
            setTimeout(() => {
                document.querySelectorAll('audio, video').forEach(m => {
                    m.play().catch(() => console.log("بانتظار ضغطة المستخدم الأولى"));
                });
            }, 2000);
        });

        // كود Disqus
        var disqus_config = function () {
            this.page.url = window.location.href;  
            this.page.identifier = 'ahmedfm_main'; 
        };
        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://ahmedfm.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
