<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ahmed FM | راديو أحمد</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --scale: 0.75; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; }
        body { 
            background: #0f0f0f; color: white; font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; padding: 0; margin: 0; direction: rtl; 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start;
            padding-top: env(safe-area-inset-top);
        }
        #installBanner {
            display: none; background: rgba(30, 30, 30, 0.95); color: white;
            padding: 10px 12px; position: fixed; top: 20px; left: 3%; width: 94%;
            z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            border: 1px solid #444; border-radius: 15px; align-items: center;
            justify-content: space-between; box-sizing: border-box; backdrop-filter: blur(10px);
        }
        #installBanner .banner-text { font-size: 12px; font-weight: 500; }
        #installBtn { background: #ff3b3b; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .player-container { background: #1c1c1c; padding: calc(30px * var(--scale)) calc(18px * var(--scale)); border-radius: 25px; width: 95%; max-width: 900px; margin: 15px auto; box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 1px solid #333; box-sizing: border-box; }
        h1 { font-size: clamp(28px, 8vw, 50px); margin-bottom: 8px; color: #fff; }
        .live-status { font-size: 22px; font-weight: bold; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; font-size: 26px; }
        .cstrEmbed { margin-top: 10px; border-radius: 15px; overflow: hidden; width: 100%; background: #fff; }
        .time-box { margin-top: 25px; font-size: clamp(16px, 4vw, 22px); font-weight: bold; background: #000; padding: 10px 25px; border-radius: 12px; direction: ltr; }
        .social { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .social a { text-decoration: none; color: white; background: #282828; padding: 12px 20px; border-radius: 12px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        #disqus_thread { margin: 25px auto; width: 95%; max-width: 900px; background: #1c1c1c; padding: 20px; border-radius: 25px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="installBanner">
        <span class="banner-text">استمع بجودة أفضل.. ثبّت تطبيق Ahmed FM 📻</span>
        <div class="banner-actions">
            <button id="installBtn">تثبيت</button>
            <span id="closeBanner" style="cursor:pointer; margin-right:10px;">&times;</span>
        </div>
    </div>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p style="opacity:0.7; direction:ltr;">Live Radio Station</p>
        <div class="live-status"><span class="live-on">●</span> LIVE</div>
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d">
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>
        <div class="time-box" id="time">🕒 --:--:--</div>
        <div class="social">
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>
    <div id="disqus_thread"></div>

    <script src="https://cdn.cloud.caster.fm/widgets/embed.js"></script>
    <script>
        // تحديث الوقت
        function updateTime() {
            const now = new Date();
            document.getElementById("time").innerText = "🕒 " + now.toLocaleTimeString('en-GB');
        }
        setInterval(updateTime, 1000); updateTime();

        // إعدادات MediaSession للتحكم من الإشعارات
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'Ahmed FM | راديو أحمد',
                    artist: 'بث مباشر الآن',
                    album: 'Ahmed FM Radio',
                    artwork: [
                        { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
                        { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
                    ]
                });

                const playStream = () => {
                    const media = document.querySelectorAll('audio, video');
                    media.forEach(m => m.play().catch(() => {}));
                };

                navigator.mediaSession.setActionHandler('play', playStream);
                navigator.mediaSession.setActionHandler('pause', () => {
                    document.querySelectorAll('audio, video').forEach(m => m.pause());
                });
                // أزرار وهمية لإبقاء الإشعار نشطاً
                navigator.mediaSession.setActionHandler('previoustrack', playStream);
                navigator.mediaSession.setActionHandler('nexttrack', playStream);
            }
        }

        // محاولة إنعاش البث عند العودة للصفحة
        function revive() {
            setupMediaSession();
            const media = document.querySelectorAll('audio, video');
            media.forEach(m => {
                if (m.paused) m.play().catch(() => {});
            });
        }

        window.addEventListener('focus', revive);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') revive();
        });

        // تشغيل الويدجت ومراقبته
        window.onload = () => {
            setupMediaSession();
            // تفقد الحالة كل 3 ثواني لو الصوت وقف والتاب مفتوحة
            setInterval(() => {
                if (document.visibilityState === 'visible') {
                    const media = document.querySelectorAll('audio, video');
                    media.forEach(m => { if(m.paused) setupMediaSession(); });
                }
            }, 3000);
        };

        // كود Disqus والبقية...
        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://ahmedfm.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
