<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed FM | راديو أحمد</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>

        body { 
            background: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            padding: 10px; /* كان 20 */
            margin: 0; 
            direction: rtl; 
        }
        
        #installBanner {
            display: none;
            background: rgba(28, 28, 28, 0.95);
            color: white;
            padding: 12px 15px;
            position: fixed;
            top: 10px; /* كان 20 */
            left: 2.5%;
            width: 95%;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #ff3b3b;
            border-radius: 20px;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .player-container { 
            background: #1c1c1c; 
            padding: 40px 20px; /* كان 50px 25px */
            border-radius: 35px; 
            width: 98%; /* كان 95% */
            max-width: 850px; /* كان 900 */
            margin: 10px auto; /* كان 20 */
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            border: 1px solid #333; 
            box-sizing: border-box; 
        }

        h1 { font-size: clamp(35px, 8vw, 55px); margin-bottom: 5px; }
        p { font-size: clamp(16px, 3.5vw, 20px); opacity: 0.7; margin-bottom: 30px; direction: ltr; }

        .live-status { 
            font-size: 24px; 
            font-weight: bold; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }

        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
        .live-on { color:#ff3b3b; animation: blink 1s infinite; font-size: 30px; }

        /* ⚠️ سيبنا الـ widget زي ما هي 100% */
        .cstrEmbed { 
            margin-top: 15px; 
            border-radius: 20px; 
            overflow: hidden; 
            width: 100%; 
            background: #fff;
        }

        .time-box { 
            margin-top: 30px; 
            font-size: clamp(20px, 4.5vw, 25px); 
            font-weight: bold; 
            background: #000; 
            display: inline-block; 
            padding: 12px 30px; 
            border-radius: 15px; 
            direction: ltr; 
        }

        .social { 
            margin-top: 25px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            flex-wrap: wrap; 
        }

        .social a { 
            text-decoration: none; 
            color: white; 
            background: #282828; 
            padding: 12px 25px; 
            border-radius: 15px; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 16px; 
            min-width: 130px; 
            justify-content: center; 
        }

        .social a:hover { background: #ff3b3b; }

        #disqus_thread { 
            margin: 30px auto; 
            width: 98%; 
            max-width: 850px; 
            background: #1c1c1c; 
            padding: 20px; 
            border-radius: 30px; 
            border: 1px solid #333; 
            box-sizing: border-box; 
        }

    </style>
</head>
<body>

    <div id="installBanner">
        <span class="banner-text">📻 استمع بجودة أفضل.. ثبّت تطبيق أحمد FM</span>
        <div class="banner-actions">
            <button id="installBtn">تثبيت</button>
            <span id="closeBanner">&times;</span>
        </div>
    </div>

    <div class="player-container">
        <h1>🎙️ Ahmed FM</h1>
        <p>Live Radio Station</p>
        <div class="live-status"><span id="liveLight" class="live-on">●</span> LIVE</div>

        <!-- ❌ متلمسناش أي حاجة هنا -->
        <div class="cstrEmbed" data-type="newStreamPlayer" data-publicToken="7309e0cd-67df-45b6-a0b5-684cc0bda99c" data-theme="light" data-color="e81e4d" data-channelId="" data-rendered="false">
            <a href="https://www.caster.fm">Shoutcast Hosting</a>
            <a href="https://www.caster.fm">Stream Hosting</a>
            <a href="https://www.caster.fm">Radio Server Hosting</a>
        </div>

        <div class="time-box" id="time">🕒 --:--:--</div>

        <div style="margin-top:40px; color:#bbb; font-size: 17px;">Contact The Host</div>

        <div class="social">
            <a href="https://www.facebook.com/ana09090" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="https://wa.me/201027415909" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>

    <div id="disqus_thread"></div>

    <script src="//cdn.cloud.caster.fm/widgets/embed.js"></script>

</body>
</html>
